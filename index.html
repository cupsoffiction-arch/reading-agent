<!-- PASSWORD PROTECTION — change the hash below to use a different password.
     To generate a new hash: https://emn178.github.io/online-tools/sha256.html
     Current password: cupsoffiction2026 -->
<script>
(function(){
  const HASH='580db3c273e54b50b543598b20dcf7c5f25e03c7d439423a90aa0cc87205d2fd';
  const SESSION_KEY='cof_auth';

  async function sha256(str){
    const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
  }

  function showLock(){
    document.documentElement.style.visibility='hidden';
    document.addEventListener('DOMContentLoaded',function(){
      document.documentElement.style.visibility='';
      document.body.innerHTML=`
      <style>
        *{box-sizing:border-box;margin:0;padding:0}
        body{background:#0F0B1A;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
        .lock{background:#1A1428;border:1px solid rgba(123,94,202,0.3);border-radius:20px;padding:36px 28px;width:min(340px,90vw);text-align:center}
        .lock-icon{font-size:48px;margin-bottom:16px}
        .lock-title{font-size:22px;font-weight:700;color:#F0EAF8;margin-bottom:6px}
        .lock-sub{font-size:14px;color:#A898CC;margin-bottom:28px}
        .lock-input{width:100%;background:#0F0B1A;border:1px solid rgba(123,94,202,0.4);border-radius:12px;color:#F0EAF8;font-size:17px;padding:14px 16px;outline:none;text-align:center;letter-spacing:2px;margin-bottom:14px}
        .lock-input:focus{border-color:#7B5ECA;box-shadow:0 0 0 3px rgba(123,94,202,0.2)}
        .lock-btn{width:100%;background:#7B5ECA;border:none;border-radius:12px;color:#fff;font-size:16px;font-weight:600;padding:15px;cursor:pointer}
        .lock-btn:active{opacity:0.85}
        .lock-error{font-size:13px;color:#F07070;margin-top:10px;min-height:18px}
      </style>
      <div class="lock">
        <div class="lock-icon">📚</div>
        <div class="lock-title">Cups of Fiction</div>
        <div class="lock-sub">Reading Agent · Private</div>
        <input class="lock-input" id="pwd-in" type="password" placeholder="Password" autocomplete="current-password"/>
        <button class="lock-btn" id="pwd-btn">Unlock</button>
        <div class="lock-error" id="pwd-err"></div>
      </div>`;
      const input=document.getElementById('pwd-in');
      const btn=document.getElementById('pwd-btn');
      const err=document.getElementById('pwd-err');
      async function tryUnlock(){
        btn.textContent='Checking…';btn.disabled=true;
        const h=await sha256(input.value.trim());
        if(h===HASH){
          sessionStorage.setItem(SESSION_KEY,'1');
          location.reload();
        }else{
          err.textContent='Incorrect password — try again';
          input.value='';input.focus();
          btn.textContent='Unlock';btn.disabled=false;
        }
      }
      btn.addEventListener('click',tryUnlock);
      input.addEventListener('keydown',e=>{if(e.key==='Enter')tryUnlock();});
      input.focus();
    });
  }

  if(sessionStorage.getItem(SESSION_KEY)!=='1'){
    showLock();
  }
})();
</script>

<style>
:root{
  --bg:#0F0B1A;--bg2:#1A1428;--bg3:#221B34;--bg4:#2D2445;
  --purple:#7B5ECA;--purple-soft:#4A3580;--purple-glow:rgba(123,94,202,0.15);
  --gold:#E8B96A;--gold-soft:rgba(232,185,106,0.15);
  --green:#4ECBA0;--green-soft:rgba(78,203,160,0.15);
  --red:#F07070;--red-soft:rgba(240,112,112,0.15);
  --amber:#F0A050;--amber-soft:rgba(240,160,80,0.15);
  --text:#F0EAF8;--text2:#A898CC;--text3:#6B5C8A;
  --border:rgba(123,94,202,0.2);--radius:14px;--radius-sm:8px;
  --safe-top:env(safe-area-inset-top,0px);--safe-bot:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;overflow:hidden}
.app{display:flex;flex-direction:column;height:100%;padding-top:var(--safe-top)}
/* Header */
.app-header{padding:16px 20px 12px;background:var(--bg);border-bottom:1px solid var(--border);flex-shrink:0}
.app-header-inner{display:flex;align-items:center;gap:12px}
.app-icon{width:36px;height:36px;border-radius:10px;background:var(--purple-glow);border:1px solid var(--purple-soft);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.app-name{font-size:17px;font-weight:600;letter-spacing:-0.3px}
.app-sub{font-size:12px;color:var(--text2);margin-top:1px}
/* Tab bar */
.tabbar{display:flex;background:var(--bg);border-top:1px solid var(--border);padding-bottom:var(--safe-bot);flex-shrink:0}
.tabbar-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 4px 8px;background:none;border:none;color:var(--text3);font-size:10px;cursor:pointer;transition:color .15s}
.tabbar-btn i{font-size:22px;line-height:1}
.tabbar-btn.on{color:var(--purple)}
.tabbar-btn.on i{filter:drop-shadow(0 0 6px var(--purple))}
/* Content */
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.panel{display:none;padding:16px 16px 24px;animation:fadeIn .15s ease}
.panel.on{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
/* Cards */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px}
.card.urgent{border-color:var(--red);box-shadow:0 0 12px var(--red-soft)}
.card.active{border-color:var(--green);box-shadow:0 0 12px var(--green-soft)}
.card.action{border-color:var(--amber);box-shadow:0 0 12px var(--amber-soft)}
.card-title{font-size:15px;font-weight:600;margin-bottom:3px;line-height:1.3}
.card-sub{font-size:13px;color:var(--text2)}
.card-row{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
/* Badges */
.badge{display:inline-flex;align-items:center;font-size:11px;font-weight:600;padding:3px 8px;border-radius:20px;white-space:nowrap}
.badge-purple{background:var(--purple-glow);color:var(--purple);border:1px solid var(--purple-soft)}
.badge-green{background:var(--green-soft);color:var(--green)}
.badge-amber{background:var(--amber-soft);color:var(--amber)}
.badge-red{background:var(--red-soft);color:var(--red)}
.badge-gold{background:var(--gold-soft);color:var(--gold)}
.badge-dim{background:var(--bg3);color:var(--text3)}
.tags{display:flex;gap:5px;flex-wrap:wrap;margin-top:7px}
/* Metrics */
.metrics{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.metric{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px}
.metric-label{font-size:11px;color:var(--text2);margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em}
.metric-value{font-size:26px;font-weight:700;letter-spacing:-1px}
.metric-note{font-size:11px;color:var(--text3);margin-top:2px}
/* Progress */
.progress-wrap{height:5px;background:var(--bg3);border-radius:3px;overflow:hidden;margin-top:10px}
.progress-bar{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--purple),#A07EF0);transition:width .4s ease}
/* Alert banners */
.alert{background:var(--red-soft);border:1px solid var(--red);border-radius:var(--radius);padding:13px;margin-bottom:12px;display:flex;gap:10px}
.alert i{color:var(--red);font-size:18px;flex-shrink:0;margin-top:1px}
.alert-title{font-size:13px;font-weight:600;color:var(--red);margin-bottom:3px}
.alert-body{font-size:12px;color:rgba(240,112,112,0.8);line-height:1.5}
.notice{background:var(--amber-soft);border:1px solid var(--amber);border-radius:var(--radius);padding:13px;margin-bottom:12px;display:flex;gap:10px}
.notice i{color:var(--amber);font-size:18px;flex-shrink:0;margin-top:1px}
.notice-title{font-size:13px;font-weight:600;color:var(--amber);margin-bottom:3px}
.notice-body{font-size:12px;color:rgba(240,160,80,0.8);line-height:1.5}
/* Section labels */
.section-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin:16px 0 8px}
/* Search */
.search-wrap{position:relative;margin-bottom:12px}
.search-wrap i{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:18px;pointer-events:none}
.search-input{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:15px;padding:11px 14px 11px 38px;outline:none}
.search-input:focus{border-color:var(--purple)}
/* Filter chips */
.chips{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:12px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;font-size:12px;font-weight:500;padding:6px 12px;border-radius:20px;background:var(--bg3);border:1px solid var(--border);color:var(--text2);cursor:pointer;white-space:nowrap}
.chip.on{background:var(--purple-glow);border-color:var(--purple);color:var(--purple)}
/* Chat */
.chat-messages{display:flex;flex-direction:column;gap:10px;padding-bottom:12px;min-height:40px}
.chat-bubble{padding:11px 14px;border-radius:var(--radius);font-size:14px;line-height:1.6;max-width:88%;white-space:pre-wrap;word-break:break-word}
.bubble-user{background:var(--purple-glow);border:1px solid var(--purple-soft);color:var(--text);align-self:flex-end}
.bubble-agent{background:var(--bg2);border:1px solid var(--border);color:var(--text);align-self:flex-start}
.bubble-agent.loading{color:var(--text3);font-style:italic}
.chat-input-wrap{position:sticky;bottom:0;background:var(--bg);border-top:1px solid var(--border);padding:12px 16px calc(12px + var(--safe-bot))}
.chat-input-row{display:flex;gap:8px}
.chat-input{flex:1;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:15px;padding:11px 14px;outline:none}
.chat-input:focus{border-color:var(--purple)}
.chat-send{width:44px;height:44px;background:var(--purple);border:none;border-radius:var(--radius-sm);color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.chat-send:disabled{opacity:.4}
.quick-chips{display:flex;gap:6px;overflow-x:auto;padding-bottom:8px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.quick-chips::-webkit-scrollbar{display:none}
.qchip{flex-shrink:0;font-size:12px;padding:7px 12px;border-radius:20px;background:var(--bg3);border:1px solid var(--border);color:var(--text2);cursor:pointer;white-space:nowrap}
.qchip:active{background:var(--purple-glow);border-color:var(--purple)}
/* Jira row */
.jira-row{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.jira-row:last-child{border-bottom:none}
.jira-key{font-size:10px;font-weight:600;color:var(--text3);min-width:50px;padding-top:2px}
.jira-info{flex:1;min-width:0}
.jira-title{font-size:13px;font-weight:500;line-height:1.3}
.jira-author{font-size:12px;color:var(--text2);margin-top:2px}
/* Due date pill */
.due{font-size:10px;font-weight:600;padding:2px 7px;border-radius:10px}
.due-urgent{background:var(--red-soft);color:var(--red)}
.due-soon{background:var(--amber-soft);color:var(--amber)}
.due-ok{background:var(--green-soft);color:var(--green)}
.due-future{background:var(--bg3);color:var(--text3)}
/* Currently reading */
.now-reading{background:linear-gradient(135deg,var(--bg2),var(--bg3));border:1px solid var(--green);border-radius:var(--radius);padding:16px;margin-bottom:14px;display:flex;align-items:center;gap:12px}
.now-reading-icon{font-size:28px;flex-shrink:0}
.now-reading-title{font-size:15px;font-weight:600}
.now-reading-sub{font-size:13px;color:var(--text2);margin-top:2px}
/* Plan step */
.plan-step{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid var(--border);align-items:flex-start}
.plan-step:last-child{border-bottom:none}
.step-num{width:24px;height:24px;border-radius:50%;background:var(--purple-glow);border:1px solid var(--purple-soft);color:var(--purple);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.step-num.hot{background:var(--red-soft);border-color:var(--red);color:var(--red)}
</style>
</head>

// Tab switching
function tab(name,btn){
  document.querySelectorAll('.tabbar-btn').forEach(b=>b.classList.remove('on'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('on'));
  btn.classList.add('on');
  document.getElementById('p-'+name).classList.add('on');
  document.getElementById('content').scrollTop=0;

// Due date badge
function dueBadge(dateStr){
  if(!dateStr)return'';
  const d=new Date(dateStr),diff=Math.round((d-now)/86400000);
  if(diff<0)return`<span class="due due-urgent">overdue</span>`;
  if(diff<=7)return`<span class="due due-urgent">${diff}d</span>`;
  if(diff<=30)return`<span class="due due-soon">${Math.round(diff/7)}w</span>`;
  if(diff<=90)return`<span class="due due-ok">${d.toLocaleDateString('en',{month:'short',day:'numeric'})}</span>`;
  return`<span class="due due-future">${d.toLocaleDateString('en',{month:'short',year:'2-digit'})}</span>`;
}

function renderPlan(){
  const conBooks=CON_ORDER.map(t=>BOOKS.find(b=>b.title===t)).filter(Boolean);
  const seriesMulti={};
  BOOKS.forEach(b=>{if(b.series){seriesMulti[b.series]=(seriesMulti[b.series]||0)+1;}});
  const seriesBooks=BOOKS.filter(b=>b.series&&seriesMulti[b.series]>1&&!CON_ORDER.includes(b.title)&&b.status!=='Reading')
    .sort((a,b)=>(a.series||'').localeCompare(b.series||'')||(parseFloat(a.volume||99)-parseFloat(b.volume||99)));

  h+=`<div class="card">`;
  [...conBooks,...seriesBooks,...standalones].slice(0,25).forEach((b,i)=>{
    const hot=CON_ORDER.includes(b.title);
    h+=`<div class="plan-step">
      <div class="step-num ${hot?'hot':''}">${i+1}</div>
      <div style="flex:1;min-width:0">
        <div style="font-size:14px;font-weight:600;line-height:1.3">${b.title}</div>
        <div style="font-size:12px;color:var(--text2);margin-top:2px">${b.author}${b.pages?' · '+b.pages+'p':''}</div>
        <div class="tags">
          ${b.series?`<span class="badge badge-purple">${b.series}${b.volume?' #'+b.volume:''}</span>`:'<span class="badge badge-dim">standalone</span>'}
          ${hot?'<span class="badge badge-red">before Aug 4</span>':''}
          ${b.year>=2026?`<span class="badge badge-gold">${b.year}</span>`:''}
        </div>
      </div>
    </div>`;
  });
  h+=`</div>`;
  document.getElementById('p-plan').innerHTML=h;
}

function renderTBR(){
  const chips=[['all','All ('+BOOKS.length+')'],['series','Series'],['standalone','Solo'],['short','<400p'],['new','2025+'],['urgent','🔥 Urgent']];
  let books=[...BOOKS];
  if(tbrSearch)books=books.filter(b=>b.title.toLowerCase().includes(tbrSearch)||(b.author||'').toLowerCase().includes(tbrSearch)||(b.series||'').toLowerCase().includes(tbrSearch));
  if(tbrFilter==='series')books=books.filter(b=>b.series);
  else if(tbrFilter==='standalone')books=books.filter(b=>!b.series);
  else if(tbrFilter==='short')books=books.filter(b=>b.pages&&b.pages<400);
  else if(tbrFilter==='new')books=books.filter(b=>b.year>=2025);
  else if(tbrFilter==='urgent')books=books.filter(b=>CON_ORDER.includes(b.title)||b.status==='Reading');

  let h=`<div class="chips">${chips.map(([v,l])=>`<button class="chip ${tbrFilter===v?'on':''}" onclick="setTbrFilter('${v}')">${l}</button>`).join('')}</div>`;
  h+=`<div class="search-wrap"><i class="ti ti-search"></i><input class="search-input" type="search" placeholder="Search…" value="${tbrSearch}" oninput="setTbrSearch(this.value)"/></div>`;
  h+=`<div style="font-size:12px;color:var(--text3);margin-bottom:10px">${books.length} book${books.length!==1?'s':''}</div>`;
  books.forEach(b=>{
    const urgent=CON_ORDER.includes(b.title);
    h+=`<div class="card ${urgent?'urgent':b.status==='Reading'?'active':''}">
      <div style="font-size:15px;font-weight:600;line-height:1.3;margin-bottom:3px">${b.title}</div>
      <div style="font-size:13px;color:var(--text2)">${b.author}${b.pages?' · '+b.pages+'p':''}</div>
      <div class="tags">
        ${b.series?`<span class="badge badge-purple">${b.series}${b.volume?' #'+b.volume:''}</span>`:'<span class="badge badge-dim">standalone</span>'}
        ${b.status==='Reading'?'<span class="badge badge-green">reading now</span>':''}
        ${urgent?'<span class="badge badge-red">before Aug 4</span>':''}
        ${b.year>=2025?`<span class="badge badge-gold">${b.year}</span>`:''}
      </div>
    </div>`;
  });
  document.getElementById('p-tbr').innerHTML=h;
}

function setTbrFilter(f){tbrFilter=f;renderTBR();}
function setTbrSearch(v){tbrSearch=v.toLowerCase();renderTBR();}

function renderJira(){
  const groups=[
    {label:'🔴 Write Review',items:JIRA.filter(j=>j.status==='Write Review'),cl:'action'},
    {label:'📖 Reading',items:JIRA.filter(j=>j.status==='Reading In Progress'),cl:'active'},
    {label:'📬 ARC Received',items:JIRA.filter(j=>j.status==='ARC Received'),cl:''},
    {label:'⏳ Awaiting Release',items:JIRA.filter(j=>j.status==='Awaiting Next Release'),cl:''},
    {label:'❌ DNF',items:JIRA.filter(j=>j.status==='DNF'),cl:''},
    {label:'✅ Posted',items:JIRA.filter(j=>j.status==='Posted'),cl:''},
    {label:'📚 To Be Read',items:JIRA.filter(j=>j.status==='TO BE READ'),cl:''},
  ];
  let h='';
  groups.forEach(g=>{
    if(!g.items.length)return;
    h+=`<div class="section-label">${g.label} (${g.items.length})</div><div class="card">`;
    g.items.forEach(j=>{
      const author=j.author||(JIRA.find(p=>p.type==='Series/Standalone'&&j.title.startsWith(p.title.split(' ')[0]))?.author||'');
      h+=`<div class="jira-row">
        <div class="jira-key">${j.key}</div>
        <div class="jira-info">
          <div class="jira-title">${j.title}</div>
          ${j.author?`<div class="jira-author">${j.author}</div>`:''}
        </div>
        ${dueBadge(j.due)}
      </div>`;
    });
    h+=`</div>`;
  });
  document.getElementById('p-jira').innerHTML=h;
}

function renderChat(){
  const quicks=[
    'What to read after Metal Slinger?',
    'Draft all Correspondent reviews',
    'Draft Metal Slinger Goodreads review',
    'Write IG reel for Metal Slinger',
    'Which books to rehome to hit 20?',
    'Series reading orders',
    'Other 2026 sequel releases?',
  ];
  document.getElementById('quick-chips').innerHTML=quicks.map(q=>`<button class="qchip" onclick="quickSend('${q}')">${q}</button>`).join('');
  document.getElementById('chat-in').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendChat();}});
}

async function quickSend(q){document.getElementById('chat-in').value=q;await sendChat();}

async function sendChat(){
  const inp=document.getElementById('chat-in');
  const q=inp.value.trim();if(!q)return;inp.value='';
  const msgs=document.getElementById('chat-msgs');
  chatHistory.push({role:'user',content:q});
  const ub=document.createElement('div');ub.className='chat-bubble bubble-user';ub.textContent=q;msgs.appendChild(ub);
  const ab=document.createElement('div');ab.className='chat-bubble bubble-agent loading';ab.textContent='Thinking…';msgs.appendChild(ab);
  msgs.scrollTop=msgs.scrollHeight;
  document.getElementById('chat-btn').disabled=true;

  const sys=`You are a personal reading assistant for Cups of Fiction (BookTok/Instagram reviewer @cupsoffiction).

JIRA CFI PROJECT (83 issues, with authors and due dates):
${JSON.stringify(JIRA.map(j=>({k:j.key,t:j.title,s:j.status,a:j.author,d:j.due})))}

BOOKBUDDY TBR (103 physical books):
${JSON.stringify(BOOKS.map(b=>({t:b.title,a:b.author,s:b.series,v:b.volume,p:b.pages,y:b.year,st:b.status||'Unread',u:b.urgent})))}

KEY FACTS (today ${now.toDateString()}):
- Currently reading: Metal Slinger by Rachel Schneider (CFI-22, due Jun 14)
- URGENT REVIEW: The Correspondent by Virginia Evans (CFI-84, due Jun 14) — Write Review status
- CoN #5 The Lion and the Deathless Dark releases Aug 4 (${daysLeft} days). Must read: Slaying the Vampire Conqueror (#2.5) → Songbird and the Heart of Stone (#3) → Fallen and the Kiss of Dusk (#4) first. CoN #1 & #2 already read.
- TBR goal: ≤20 physical books by Dec 31 2026 (remove ${toRemove}, need ${pace}/month)
- Review platforms: Website, Goodreads, Fable, Amazon, Instagram (reels + posts)
- Write reviews in warm, enthusiastic BookTok style as Cups of Fiction
- Red Rising: books 1–6 on shelf. War of Lost Hearts: complete trilogy. Poppy War: book 1 read, books 2–3 on shelf.`;

  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:sys,messages:chatHistory})});
    const data=await res.json();
    const reply=(data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('\n');
    chatHistory.push({role:'assistant',content:reply});
    ab.textContent=reply;ab.classList.remove('loading');
  }catch(e){ab.textContent='Something went wrong — please try again.';ab.classList.remove('loading');}
  document.getElementById('chat-btn').disabled=false;
  msgs.scrollTop=msgs.scrollHeight;
}

// Init
renderHome();renderPlan();renderTBR();renderJira();renderChat();
</script>
</body>
